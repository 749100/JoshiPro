<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Jobs | JoshiPro</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/findJobs.css">
</head>

<body>

    <header class="dashboard-header">
        <div class="header-left">
            <span class="dashboard-title" style="font-weight: 800; color: #2d3748; margin-left: 260px;">JOSHIPRO</span>
        </div>
        <div class="header-right">
            <a href="profile.html" class="profile-avatar-link">
                <div class="avatar-container">
                    <img class="avatar-image" id="topHeaderAvatar" src="../images/logo.jpeg"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%230066cc\'><path d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z\'/></svg>'"
                        alt="Profile">
                </div>
            </a>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">JoshiPro</div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">Dashboard</a>
                <a href="findJobs.html" class="menu-item active">Find Jobs</a>
                <a href="postJob.html" class="menu-item">Post a Job</a>
                <a href="applications.html" class="menu-item">Applications</a>
                <a href="notifications.html" class="menu-item">Notifications</a>
            </nav>
            <button id="sidebarLogoutBtn" class="logout-btn">Log Out</button>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div>
                    <h1>Explore Opportunities</h1>
                    <p>Find your next career move across top-tier technical platforms.</p>
                </div>
            </header>

            <section class="search-filter-section">
                <input type="text" id="jobSearchInput"
                    placeholder="Search by title, role keyword, or corporate enterprise...">
                <button id="searchButton" class="search-action-btn">Search Jobs</button>
            </section>

            <section id="jobsGridDisplay" class="jobs-marketplace-grid">
                <div class="loading-placeholder-message">Initialising live career pipeline vectors...</div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

    <script src="../js/config.js"></script>
    <script src="../js/findJobs.js"></script>
</body>

</html>
