<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job | JoshiPro</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/postJob.css">
</head>

<body>

    <header class="dashboard-header">
        <div class="header-left">
            <span class="dashboard-title" style="font-weight: 800; color: #2d3748; margin-left: 260px;">JOSHIPRO</span>
        </div>
        <div class="header-right">
            <a href="profile.html" class="profile-avatar-link">
                <div class="avatar-container">
                    <img class="avatar-image" id="topHeaderAvatar" src="../images/logo.jpeg"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%230066cc\'><path d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z\'/></svg>'"
                        alt="Profile">
                </div>
            </a>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">JoshiPro</div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">Dashboard</a>
                <a href="findJobs.html" class="menu-item">Find Jobs</a>
                <a href="postJob.html" class="menu-item active">Post a Job</a>
                <a href="applications.html" class="menu-item">Applications</a>
                <a href="notifications.html" class="menu-item">Notifications</a>
            </nav>
            <button id="sidebarLogoutBtn" class="logout-btn">Log Out</button>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div>
                    <h1>Post a New Opportunity</h1>
                    <p>Publish an open position to the global JoshiPro career marketplace channels.</p>
                </div>
            </header>

            <section class="form-container-card">
                <form id="jobSubmissionForm">
                    <div class="form-group">
                        <label for="jobTitle">Job Title</label>
                        <input type="text" id="jobTitle" placeholder="e.g., Plumber, Electrician" required>
                    </div>
                    <div class="form-group">
                        <label for="jobCategory">Job Category</label>
                        <select id="jobCategory" required>
                            <option value="">Select a category</option>
                            <option value="plumbing">Plumbing</option>
                            <option value="electricals">Electricals</option>
                            <option value="construction">Construction</option>
                            <option value="catering">Catering</option>
                            <option value="gardening">Gardening</option>
                            <option value="designer">Interior Design</option>
                            <option value="cleaning">Cleaning Services</option>
                            <option value="moving">Moving & Relocation</option>
                            <option value="delivery">Delivery</option>
                            <option value="tutoring">Tutoring</option>
                            <!-- Add more categories as needed -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="companyName">Company Name</label>
                        <input type="text" id="companyName" placeholder="e.g., Acme Tech Corp" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="jobLocation">Location</label>
                            <input type="text" id="jobLocation" placeholder="e.g., Nairobi, KE or Remote" required>
                        </div>
                        <div class="form-group">
                            <label for="jobSalary">Salary Range</label>
                            <input type="text" id="jobSalary" placeholder="e.g., Ksh 100,000 - Ksh 150,000" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="jobType">Job Type</label>
                        <select id="jobType" required>
                            <option value="">Select a type</option>
                            <option value="full-time">Full-Time</option>
                            <option value="part-time">Part-Time</option>
                            <option value="contract">Contract</option>
                            <option value="internship">Internship</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="jobDescription">Job Description</label>
                        <textarea id="jobDescription" rows="6"
                            placeholder="Provide a detailed operational summary of responsibilities, requirements, and tech stack details..."
                            required></textarea>
                    </div>

                    <button type="submit" id="btnSubmitJob" class="form-submit-btn">Publish Position</button>
                </form>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

    <script src="../js/config.js"></script>
    <script src="../js/postJob.js"></script>
</body>

</html>
