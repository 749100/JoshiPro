<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | JoshiPro</title>
    <link rel="stylesheet" href="../css/reset.css">
</head>

<body>

    <div class="reset-container">
        <div class="reset-card">

            <div class="reset-header">
                <h2>JoshiPro</h2>
                <p>Reset Your Password</p>
            </div>

            <p class="reset-instruction-text">
                Please enter the email address associated with your JoshiPro account. We will send you a link to
                reset your password and regain access to your account.
            </p>

            <form id="passwordResetForm">
                <div class="form-group-block">
                    <label for="resetUserEmail">Recovery Email</label>
                    <input type="email" id="resetUserEmail" autocomplete="email" placeholder="yourname@example.com"
                        required>
                </div>

                <button type="submit" id="submitResetActionBtn" class="reset-action-trigger-btn">
                    Send Recovery Link
                </button>
            </form>

            <div class="auth-divider">
                <span>OR</span>
            </div>

            <button type="button" id="googleSignInBtn" class="google-oauth-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                    alt="Google Logo">
                Continue with Google
            </button>

            <div class="reset-footer-shortcuts">
                <a href="login.html" class="back-navigation-link">← Return to Login Screen</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>

    <script src="../js/config.js"></script>
    <script src="../js/reset.js"></script>
</body>

</html>
